name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint, Spelling, and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: node --run test
